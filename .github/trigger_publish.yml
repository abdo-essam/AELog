# .github/workflows/trigger_publish.yml
name: Trigger Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version name (e.g. 1.0.7)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  trigger:
    name: 🚀 Bump and Tag Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Configure Git Author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Execute Publish Script
        run: |
          # bypass branch check constraint inside GitHub Action runner if git environment is detached
          git checkout -B main
          chmod +x ./scripts/publish.sh
          ./scripts/publish.sh ${{ inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
