name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  # ── Code Quality ─────────────────────────────────────
  quality:
    name: 🧹 Code Quality
    runs-on: ubuntu-latest
    # Skip if only docs/config changed — no code to lint
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      (
        github.event_name == 'pull_request' ||
        contains(toJson(github.event.commits.*.modified), '.kt') ||
        contains(toJson(github.event.commits.*.modified), '.kts') ||
        contains(toJson(github.event.commits.*.added), '.kt') ||
        contains(toJson(github.event.commits.*.added), '.kts')
      )
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Apply formatting
        run: ./gradlew spotlessApply

      - name: Update API dumps
        run: ./gradlew apiDump

      - name: Auto Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto format and api dump [skip ci]"

  # ── Build & Test (Android + JVM) ─────────────────────
  build-android:
    name: 🤖 Android Build & Test
    runs-on: ubuntu-latest
    needs: quality
    # Run when: source code or build files changed
    if: |
      always() && (needs.quality.result == 'success' || needs.quality.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew assemble

      - name: Unit Tests
        run: ./gradlew jvmTest testDebugUnitTest

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-android
          path: '**/build/reports/tests/'

  # ── Build & Test (iOS) ──────────────────────────────
  build-ios:
    name: 🍎 iOS Build & Test
    runs-on: macos-latest
    needs: quality
    # Only run iOS build if KMP source files changed (expensive job)
    if: |
      always() && (needs.quality.result == 'success' || needs.quality.result == 'skipped') &&
      (
        github.event_name == 'pull_request' ||
        contains(toJson(github.event.commits.*.modified), 'commonMain') ||
        contains(toJson(github.event.commits.*.modified), 'iosMain') ||
        contains(toJson(github.event.commits.*.modified), 'build.gradle') ||
        contains(toJson(github.event.commits.*.modified), 'libs.versions.toml')
      )
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      - name: Build iOS Framework
        run: ./gradlew compileKotlinIosArm64

      - name: iOS Tests
        run: ./gradlew iosSimulatorArm64Test

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-ios
          path: '**/build/reports/tests/'

  # ── Sample App Build ─────────────────────────────────
  sample:
    name: 📱 Sample App
    runs-on: ubuntu-latest
    needs: [build-android]
    # Skip if only docs changed
    if: |
      always() && needs.build-android.result == 'success' &&
      !contains(toJson(github.event.commits.*.modified), 'docs/') &&
      !contains(toJson(github.event.commits.*.modified), '.md')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      - name: Build Sample
        run: ./gradlew :sample:composeApp:assembleDebug

  # ── Docs only — lightweight check ────────────────────
  docs-check:
    name: 📝 Docs Check
    runs-on: ubuntu-latest
    # Only run when docs/markdown changed — skips all Gradle overhead
    if: |
      contains(toJson(github.event.commits.*.modified), '.md') ||
      contains(toJson(github.event.commits.*.modified), 'docs/') ||
      contains(toJson(github.event.commits.*.modified), 'mkdocs.yml')
    steps:
      - uses: actions/checkout@v4
      - name: Check links in markdown
        run: |
          echo "Docs-only change detected. Skipping build pipeline."
          echo "Files changed: ${{ toJson(github.event.commits.*.modified) }}"
